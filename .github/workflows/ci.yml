name: "CI"
on: ["push", "pull_request"]

jobs:
  test_and_build:
    name: "Build mix release"
    runs-on: "ubuntu-latest"
    steps:
    - name: Setup elixir
      uses: erlef/setup-beam@v1

    - uses: actions/checkout@v1
    - run: |
        mix local.hex --force
        mix deps.get
        mix lint
        mix test
